{% extends "base.html" %}
{% block title %}{{ 'Edit' if appointment else 'New' }} Appointment{% endblock %}

{% block content %}
<div class="form-container">
    <h1>{{ 'Edit Appointment' if appointment else 'New Appointment' }}</h1>

    <form method="POST">
        <div class="form-group">
            <label for="title">Title *</label>
            <input type="text" id="title" name="title" required
                   value="{{ appointment.title if appointment else '' }}">
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="date">Date *</label>
                <input type="date" id="date" name="date" required
                       value="{{ appointment.date if appointment else '' }}">
            </div>
            <div class="form-group">
                <label for="time">Time *</label>
                <input type="time" id="time" name="time" required
                       value="{{ appointment.time if appointment else '' }}">
            </div>
        </div>

        <div class="form-group">
            <label for="location">Location</label>
            <input type="text" id="location" name="location"
                   value="{{ appointment.location if appointment else '' }}">
        </div>

        <div class="form-group">
            <label for="category">Category</label>
            <select id="category" name="category">
                <option value="general" {% if not appointment or appointment.category == 'general' %}selected{% endif %}>General</option>
                <option value="work" {% if appointment and appointment.category == 'work' %}selected{% endif %}>Work</option>
                <option value="personal" {% if appointment and appointment.category == 'personal' %}selected{% endif %}>Personal</option>
                <option value="medical" {% if appointment and appointment.category == 'medical' %}selected{% endif %}>Medical</option>
                <option value="other" {% if appointment and appointment.category == 'other' %}selected{% endif %}>Other</option>
            </select>
        </div>

        <div class="form-group">
            <label for="notes">Notes</label>
            <textarea id="notes" name="notes" rows="4">{{ appointment.notes if appointment else '' }}</textarea>
        </div>

        <div class="form-actions">
            <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Cancel</a>
            <button type="submit" class="btn btn-primary">{{ 'Save Changes' if appointment else 'Create Appointment' }}</button>
        </div>
    </form>
</div>
{% endblock %}
