{% extends "base.html" %}
{% block title %}Register{% endblock %}

{% block content %}
<div class="auth-container">
    <h1>Create an account</h1>
    <p class="subtitle">Start managing your appointments</p>

    <form method="POST">
        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" required autofocus>
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
            <label for="password">Password <span class="hint">(min. 6 characters)</span></label>
            <input type="password" id="password" name="password" required minlength="6">
        </div>
        <button type="submit" class="btn btn-primary">Create Account</button>
    </form>

    <p class="auth-link">Already have an account? <a href="{{ url_for('auth.login') }}">Log in</a></p>
</div>
{% endblock %}
